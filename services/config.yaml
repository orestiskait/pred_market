# =============================================================================
# Services Configuration
# =============================================================================
#
# Two containers:
#   kalshi-listener  — Kalshi WebSocket market data snapshots
#   weather-bot      — Paper trading + wethr real-time ingest + NWP model data
#
# OCI deployment: toggle each container on/off without touching code.
# =============================================================================
oci:
  kalshi_listener: true
  weather_bot: true

# =============================================================================
# CREDENTIALS
# =============================================================================
# All secrets live in files under credentials.dir.
# Override dir with CREDENTIALS_DIR env (e.g. /app/credentials in Docker).
#
# File layout under credentials.dir:
#   kalshi_api_key.txt    - Kalshi private key PEM
#   kalshi_api_key_id     - Kalshi API key ID
#   wethr_api_key         - Wethr.net Push API key
#   aws_access_key_id     - AWS Access Key ID (SQS/SNS for NWP; S3 is anonymous)
#   aws_secret_access_key - AWS Secret Access Key (SQS/SNS for NWP)
# =============================================================================
credentials:
  dir: "~/.kalshi"
  kalshi_private_key: "kalshi_api_key.txt"
  kalshi_api_key_id: "kalshi_api_key_id"
  wethr_api_key: "wethr_api_key"
  aws_access_key_id: "aws_access_key_id"
  aws_secret_access_key: "aws_secret_access_key"

# =============================================================================
# KALSHI API
# =============================================================================
kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  ws_url:   "wss://api.elections.kalshi.com/trade-api/ws/v2"

# =============================================================================
# EVENT SERIES — BY CONSUMER
# =============================================================================
# kalshi_listener — orderbook/ticker snapshots (kalshi/listener.py)
# weather_bot     — wethr ingest, NWP ingest, paper trading (bot/weather_bot.py)
# research        — offline analysis scripts
#
# Adding a new city:
#   1. Add KalshiMarketConfig in services/markets/kalshi_registry.py
#   2. Add the series prefix to the consumer(s) below
# =============================================================================
event_series:
  default: &default_series
    - "KXHIGHCHI"
    - "KXHIGHNY"
    - "KXHIGHLAX"
    - "KXHIGHMIA"
    - "KXHIGHDCA"
    - "KXHIGHATL"
    - "KXHIGHAUS"

  kalshi_listener: *default_series
  weather_bot:
    - "KXHIGHCHI"
  research:
    - "KXHIGHCHI"

# =============================================================================
# EVENT ROLLOVER
# =============================================================================
# Periodic re-discovery of active event tickers as markets roll at local midnight.
# event_selection: "active" = earliest close_time; "next" = earliest strike_date >= today
# =============================================================================
event_rollover:
  event_selection: "active"
  rediscover_interval_seconds: 300

# =============================================================================
# STORAGE
# =============================================================================
storage:
  data_dir: "../data"           # Relative to config file; resolves to project root data/
  flush_interval_seconds: 300

# =============================================================================
# KALSHI LISTENER — Snapshot collection
# =============================================================================
# Used by: kalshi/listener.py ONLY
# =============================================================================
collection:
  interval_seconds: 60
  spike_threshold_cents: 3
  spike_cooldown_seconds: 2
  max_orderbook_depth: 5
  baseline_every_n_snapshots: 60

# =============================================================================
# WETHR.NET PUSH API — Real-time SSE weather ingest
# =============================================================================
# Used by: bot/weather_bot.py (trading signals + storage)
#
# Streams real-time observations, DSM/CLI releases, and temperature extreme
# alerts via Server-Sent Events. All event types are stored to parquet:
#   data/wethr_push/<event_type>/<ICAO>_YYYY-MM-DD.parquet
#
# Stations are derived from event_series.weather_bot via the market registry.
# =============================================================================
wethr:
  enabled: true
  # stations:  # optional override; omit → uses event_series.weather_bot → registry
  #   - KMDW

# =============================================================================
# NWP MODEL DATA — Real-time HRRR, RRFS, NBM ingest via AWS SNS
# =============================================================================
# Used by: bot/weather_bot.py (NWPSNSListener component)
#
# Subscribes to NOAA AWS SNS topics for new model output. Receives S3 object
# notifications via SQS long-polling, extracts point data at station coordinates,
# and saves to parquet with latency metadata.
#
# AWS credentials (from credentials dir) are used ONLY for SQS/SNS (queue
# creation, subscriptions, polling). S3 downloads use anonymous access.
#
# Stations are derived from event_series.weather_bot via the market registry.
# =============================================================================
nwp:
  aws_region: us-east-1
  sqs_queue_prefix: pred-market-nwp
  poll_interval_seconds: 20
  delete_queue_on_shutdown: true
  models:
    hrrr:
      sns_topic_arn: "arn:aws:sns:us-east-1:123901341784:NewHRRRObject"
      s3_bucket: "noaa-hrrr-bdp-pds"
      enabled: true
      max_forecast_hour: 18
    rrfs:
      sns_topic_arn: "arn:aws:sns:us-east-1:709902155096:NewRRFSObject"
      s3_bucket: "noaa-rrfs-pds"
      enabled: true
      max_forecast_hour: 18
    nbm:
      sns_topic_arn: "arn:aws:sns:us-east-1:123901341784:NewNBMCOGObject"
      s3_bucket: "noaa-nbm-pds"
      enabled: true
      max_forecast_hour: 24

# =============================================================================
# WEATHER BOT — Paper trading strategy
# =============================================================================
# Used by: bot/weather_bot.py ONLY
#
#   paper_mode          true = simulated fills, false = real Kalshi orders
#   consecutive_obs     ASOS obs ≥ cap_strike needed before buying NO
#   max_price_cents     max price (in cents) the sweep will pay
#   max_spend_per_event max $ to spend per event ticker; 0 or omitted = uncapped
# =============================================================================
bot:
  strategies:
    - id: "chicago_fast_ladder"
      class_name: "LadderStrategy"
      targets:
        - "KXHIGHCHI"
      params:
        paper_mode: true
        consecutive_obs: 2
        max_price_cents: 95
        max_spend_per_event: 1000
