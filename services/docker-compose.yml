# =============================================================================
# Docker Compose — Kalshi listener, Synoptic listener, weather bot, NWP listener
# =============================================================================
# Runs three services:
#
#   kalshi-listener    — Kalshi WebSocket listener (market data, orderbooks)
#   synoptic-listener  — Synoptic WebSocket listener (real-time weather obs)
#   weather-bot        — Weather paper execution bot
#
# Data is persisted to the host directory (~/collector-data).
#
# Usage:
#   docker compose up -d
#   docker compose down
# =============================================================================

services:
  # ── Kalshi market data listener ────────────────────────────────────────────
  kalshi-listener:
    image: kalshi-services:latest
    container_name: kalshi-listener
    restart: unless-stopped
    env_file:
      - ${SHARED_ENV_FILE:-.env}
    volumes:
      - ${DATA_DIR:-../data}:/app/data
    networks:
      - collector-net

  # ── Synoptic listener (WebSocket weather ingest) ─────────────────────────
  synoptic-listener:
    image: kalshi-services:latest
    container_name: synoptic-listener
    restart: unless-stopped
    command: python -m services.synoptic.listener
    env_file:
      - ${SHARED_ENV_FILE:-.env}
    volumes:
      - ${DATA_DIR:-../data}:/app/data
    networks:
      - collector-net

  # ── Weather Paper Execution Bot ───────────────────────────────────────────
  weather-bot:
    image: kalshi-services:latest
    container_name: weather-bot
    restart: unless-stopped
    command: python -m services.bot.weather_bot
    env_file:
      - ${SHARED_ENV_FILE:-.env}
    volumes:
      - ${DATA_DIR:-../data}:/app/data
    networks:
      - collector-net

  # ── NWP SNS Listener (real-time weather model data ingest) ────────────────
  # AWS credentials: read from credentials dir for SQS/SNS only. S3 downloads
  # (NOAA public buckets) use anonymous access — do NOT pass AWS_* env vars.
  nwp-listener:
    image: kalshi-services:latest
    container_name: nwp-listener
    restart: unless-stopped
    command: python -m services.weather.sns_listener
    env_file:
      - ${SHARED_ENV_FILE:-.env}
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      # Explicitly unset so S3 downloads use anonymous access (credentials from files for SQS/SNS only)
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
    volumes:
      - ${DATA_DIR:-../data}:/app/data
    networks:
      - collector-net

networks:
  collector-net:
    driver: bridge
