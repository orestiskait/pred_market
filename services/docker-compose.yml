# =============================================================================
# Docker Compose — Two containers
#
#   kalshi-listener  — Kalshi WebSocket market data snapshots
#   weather-bot      — Paper trading + wethr real-time ingest + NWP model data
#
# Data is persisted to the host directory (~/collector-data).
#
# Usage:
#   docker compose up -d
#   docker compose down
# =============================================================================

services:
  # ── Kalshi market data listener ────────────────────────────────────────────
  kalshi-listener:
    image: kalshi-services:latest
    container_name: kalshi-listener
    restart: unless-stopped
    env_file:
      - ${SHARED_ENV_FILE:-.env}
    environment:
      # Preload system libcurl to avoid rasterio/pyarrow version mismatch (override on ARM: LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libcurl.so.4)
      - LD_PRELOAD=${LD_PRELOAD:-/usr/lib/x86_64-linux-gnu/libcurl.so.4}
    volumes:
      - ${DATA_DIR:-../data}:/app/data
    networks:
      - collector-net

  # ── Weather bot: trading + wethr ingest + NWP model data ─────────────────
  # AWS credentials are read from credentials dir for SQS/SNS only.
  # S3 downloads (NOAA public buckets) use anonymous access.
  weather-bot:
    image: kalshi-services:latest
    container_name: weather-bot
    restart: unless-stopped
    command: python -m services.bot.weather_bot
    env_file:
      - ${SHARED_ENV_FILE:-.env}
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      # Explicitly unset so S3 downloads use anonymous access
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
    volumes:
      - ${DATA_DIR:-../data}:/app/data
    networks:
      - collector-net

networks:
  collector-net:
    driver: bridge
